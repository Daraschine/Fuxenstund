<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🦊 Fuxen Planung FS26</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--fo:#FF6B35;--fd:#C94A12;--fl:#FFD4B8;--fc:#FFF8F0;--fb:#6B3A2A;--tg:#FFB347;--ink:#2D1A0E;--mu:#8B6355;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--fc);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── FOX IDLE ANIMATIONS ── */
@keyframes breathe{0%,100%{transform:scaleY(1) scaleX(1);}50%{transform:scaleY(1.04) scaleX(0.98);}}
@keyframes breatheBody{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
@keyframes tailIdle{0%,100%{transform:rotate(0deg);}30%{transform:rotate(12deg);}70%{transform:rotate(-8deg);}}
@keyframes earIdleL{0%,85%,100%{transform:rotate(0deg);}88%{transform:rotate(-22deg);}93%{transform:rotate(10deg);}97%{transform:rotate(-6deg);}}
@keyframes earIdleR{0%,78%,100%{transform:rotate(0deg);}82%{transform:rotate(18deg);}87%{transform:rotate(-8deg);}92%{transform:rotate(5deg);}}
@keyframes blinkL{0%,91%,100%{transform:scaleY(1);}94%{transform:scaleY(0.04);}}
@keyframes blinkR{0%,89%,100%{transform:scaleY(1);}92%{transform:scaleY(0.04);}}
@keyframes noseIdle{0%,100%{transform:scale(1);}60%{transform:scale(1.08);}}
@keyframes headSway{0%,100%{transform:rotate(0deg);}40%{transform:rotate(2.5deg);}75%{transform:rotate(-1.5deg);}}
@keyframes pawShift{0%,100%{transform:translateX(0);}50%{transform:translateX(2px);}}
@keyframes tailWag{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(25deg);}}
@keyframes tailThump{0%{transform:rotate(-10deg);}15%{transform:rotate(35deg);}30%{transform:rotate(-15deg);}45%{transform:rotate(40deg);}60%{transform:rotate(-10deg);}100%{transform:rotate(-10deg);}}
@keyframes headTilt{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-18deg);}}
@keyframes jumpUp{0%,100%{transform:translateY(0);}30%{transform:translateY(-22px);}60%{transform:translateY(-12px);}}
@keyframes excited{0%,100%{transform:translateY(0) rotate(0deg);}15%{transform:translateY(-14px) rotate(-5deg);}30%{transform:translateY(-6px) rotate(4deg);}45%{transform:translateY(-18px) rotate(-4deg);}60%{transform:translateY(-8px) rotate(3deg);}75%{transform:translateY(-4px) rotate(-2deg);}}
@keyframes sniffAround{0%,100%{transform:rotate(0deg) translateX(0);}20%{transform:rotate(12deg) translateX(4px);}50%{transform:rotate(-10deg) translateX(-3px);}75%{transform:rotate(8deg) translateX(2px);}}
@keyframes runFox{0%{left:-100px;}100%{left:calc(100% + 100px);}}
@keyframes floatPaw{0%,100%{transform:translateY(0) rotate(0deg);opacity:.06;}50%{transform:translateY(-10px) rotate(15deg);opacity:.1;}}
@keyframes headBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes popIn{0%{transform:scale(0) rotate(-8deg);opacity:0;}65%{transform:scale(1.12) rotate(2deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes cardSlide{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes confettiFall{0%{transform:translateY(-40px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(900deg);opacity:0;}}
@keyframes shimmerText{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes wobble{0%,100%{transform:rotate(0deg);}20%{transform:rotate(-6deg);}40%{transform:rotate(5deg);}60%{transform:rotate(-3deg);}80%{transform:rotate(2deg);}}
@keyframes heartPop{0%{transform:scale(0) translateY(0);opacity:1;}60%{transform:scale(1.3) translateY(-18px);opacity:1;}100%{transform:scale(0.8) translateY(-32px);opacity:0;}}
@keyframes questionFloat{0%{transform:scale(0) translateY(0);opacity:1;}60%{transform:scale(1.2) translateY(-20px);opacity:1;}100%{transform:scale(0.8) translateY(-38px);opacity:0;}}

/* ── HEADER ── */
.hdr{background:linear-gradient(150deg,#FF8C42 0%,#C94A12 100%);padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;border-bottom:5px solid var(--fb);}
.hdr-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.hdr-bg span{position:absolute;font-size:70px;opacity:.07;animation:floatPaw 4s ease-in-out infinite;}

/* FOX WRAPPER */
.fox-stage{width:180px;height:180px;margin:0 auto 10px;position:relative;cursor:pointer;}
.fox-stage svg{width:100%;height:100%;overflow:visible;}
.fox-bubble{position:absolute;top:-2px;right:4px;font-size:22px;opacity:0;pointer-events:none;}
.fox-bubble.pop{animation:heartPop 1s ease forwards;}
.fox-bubble.question{animation:questionFloat 1s ease forwards;}

.hdr-title{font-family:'Fredoka One',cursive;font-size:clamp(26px,7vw,38px);color:#fff;text-shadow:3px 3px 0 var(--fb);line-height:1.15;}
.hdr-title em{font-style:normal;background:linear-gradient(90deg,#FFD700,#FFB347,#FF8C00,#FFD700);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmerText 2s linear infinite;}
.hdr-sub{color:rgba(255,255,255,.8);font-size:13px;font-weight:700;margin-top:5px;letter-spacing:.5px;}

.jagged{height:28px;background:var(--fc);clip-path:polygon(0 100%,2% 0,4% 100%,6% 15%,8% 100%,10% 0,12% 100%,14% 20%,16% 100%,18% 5%,20% 100%,22% 0,24% 100%,26% 18%,28% 100%,30% 0,32% 100%,34% 22%,36% 100%,38% 0,40% 100%,42% 12%,44% 100%,46% 0,48% 100%,50% 8%,52% 100%,54% 0,56% 100%,58% 20%,60% 100%,62% 0,64% 100%,66% 14%,68% 100%,70% 0,72% 100%,74% 18%,76% 100%,78% 6%,80% 100%,82% 0,84% 100%,86% 22%,88% 100%,90% 0,92% 100%,94% 16%,96% 100%,98% 0,100% 100%);margin-top:-1px;}
.jagged-top{background:var(--fd);}
.runner{height:52px;background:#fff8f0;border-bottom:2px dashed var(--fl);position:relative;overflow:hidden;}
.runner-ground{position:absolute;bottom:6px;left:0;right:0;height:2px;background:repeating-linear-gradient(90deg,var(--fl) 0,var(--fl) 16px,transparent 16px,transparent 26px);}
.runner-fox{position:absolute;bottom:8px;font-size:32px;line-height:1;animation:runFox 6s linear infinite;}

.sel{padding:20px 16px 10px;}
.sel-title{font-family:'Fredoka One',cursive;font-size:20px;color:var(--fd);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sel-title .bounce{animation:headBob 1.5s ease-in-out infinite;}
.sel-wrap{position:relative;}
.sel-wrap::before{content:'🦊';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none;z-index:2;}
.sel-wrap::after{content:'▼';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--fd);font-size:12px;pointer-events:none;}
select#fp{width:100%;appearance:none;background:#fff;border:3px solid var(--fo);border-radius:20px;padding:14px 44px 14px 48px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--fb);cursor:pointer;box-shadow:0 5px 0 var(--fd);transition:transform .12s,box-shadow .12s;}
select#fp:active{transform:translateY(3px);box-shadow:0 2px 0 var(--fd);}
select#fp:focus{outline:none;}

.fux-panel{margin:14px 16px 0;background:linear-gradient(135deg,#fff5eb,#ffe6d0);border:3px solid var(--fo);border-radius:22px;padding:18px 16px 16px;display:none;box-shadow:0 6px 0 var(--fd);animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) both;}
.fux-panel.show{display:block;}
.ph{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.pav{width:58px;height:58px;border-radius:50%;background:var(--fo);border:3px solid var(--fd);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 3px 0 var(--fb);flex-shrink:0;animation:headBob 2s ease-in-out infinite;}
.pn{font-family:'Fredoka One',cursive;font-size:22px;color:var(--fd);}
.pc2{font-size:13px;font-weight:700;color:var(--mu);margin-top:2px;}
.pev-list{display:flex;flex-direction:column;gap:9px;}
.pev{background:#fff;border-radius:14px;border:2px solid var(--fl);border-left:5px solid var(--fo);padding:11px 13px;animation:cardSlide .3s ease both;}
.pev:nth-child(odd){border-left-color:var(--fd);}
.pev-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;}
.pev-name{font-family:'Fredoka One',cursive;font-size:15px;color:var(--fd);flex:1;line-height:1.2;}
.pev-date{background:var(--fo);color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.pev-meta{font-size:11px;color:var(--mu);font-weight:700;margin-bottom:5px;}
.pev-comment{font-size:11px;color:var(--mu);font-style:italic;margin-top:6px;padding-top:6px;border-top:1px dashed var(--fl);}
.no-tasks{text-align:center;padding:14px;color:var(--mu);font-weight:700;font-size:14px;}

.pills{display:flex;flex-wrap:wrap;gap:4px;}
.pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;border:1.5px solid;}
.pv2{background:#fff0e0;color:#b34d00;border-color:#ffb870;}
.ps2{background:#e8f5e9;color:#2e7d32;border-color:#81c784;}
.pa2{background:#e3f2fd;color:#1565c0;border-color:#90caf9;}
.pp2{background:#f3e5f5;color:#6a1b9a;border-color:#ce93d8;}
.pst2{background:#e0f7fa;color:#00838f;border-color:#4dd0e1;}
.pc3{background:#fce4ec;color:#880e4f;border-color:#f48fb1;}
.pwb{background:#fff9c4;color:#f57f17;border-color:#ffd54f;}
.pru{background:#e8eaf6;color:#283593;border-color:#9fa8da;}

.sec{display:flex;align-items:center;gap:10px;padding:22px 16px 8px;}
.sec-t{font-family:'Fredoka One',cursive;font-size:20px;color:var(--fd);}
.sec-l{flex:1;height:2px;background:var(--fl);border-radius:2px;}
.sec-p{font-size:18px;animation:pulse 2s infinite;}
.mol{font-family:'Fredoka One',cursive;font-size:13px;color:var(--fo);letter-spacing:.15em;text-transform:uppercase;padding:14px 0 5px 4px;display:flex;align-items:center;gap:5px;}

.evlist{padding:0 16px 48px;display:flex;flex-direction:column;gap:9px;}
.ev{background:#fff;border-radius:16px;border:2px solid var(--fl);overflow:hidden;box-shadow:0 3px 0 #f0d0b8;transition:transform .15s,box-shadow .15s;}
.ev.past{opacity:.5;filter:grayscale(.4);}
.ev.today{border:3px solid var(--fo);box-shadow:0 5px 0 var(--fd),0 0 0 5px rgba(255,107,53,.12);}
.ev.multi .ev-dt{background:#9b2335;}
.ev:active{transform:scale(.98);}
.ev-top{display:flex;align-items:stretch;}
.ev-dt{background:var(--fo);min-width:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 6px;flex-shrink:0;}
.ev.past .ev-dt{background:#bbb;}
.ev.today .ev-dt{background:var(--fd);}
.ev-day{font-family:'Fredoka One',cursive;font-size:27px;color:#fff;line-height:1;}
.ev-mo{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.8);margin-top:1px;}
.ev-time{font-size:9px;color:rgba(255,255,255,.6);margin-top:3px;font-weight:700;}
.today-chip{background:var(--tg);color:var(--fb);font-size:8px;font-weight:800;padding:2px 5px;border-radius:20px;margin-top:3px;letter-spacing:.04em;animation:pulse 1.5s infinite;}
.ev-body{flex:1;padding:11px 12px;min-width:0;}
.ev-title{font-family:'Fredoka One',cursive;font-size:16px;color:var(--ink);line-height:1.2;margin-bottom:4px;}
.ev-loc{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--mu);background:#f5ede5;padding:2px 8px;border-radius:20px;margin-bottom:6px;}
.ev-chips{display:flex;flex-wrap:wrap;gap:3px;}
.chip{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;border:1.5px solid;}
.ch-v{background:#fff0e0;color:#b34d00;border-color:#ffb870;}
.ch-s{background:#e8f5e9;color:#2e7d32;border-color:#81c784;}
.ch-a{background:#e3f2fd;color:#1565c0;border-color:#90caf9;}
.ch-p{background:#f3e5f5;color:#6a1b9a;border-color:#ce93d8;}
.ch-st{background:#e0f7fa;color:#00838f;border-color:#4dd0e1;}
.ch-c{background:#fce4ec;color:#880e4f;border-color:#f48fb1;}
.ch-wb{background:#fff9c4;color:#f57f17;border-color:#ffd54f;}
.ch-ru{background:#e8eaf6;color:#283593;border-color:#9fa8da;}
.ev-tog{width:100%;background:none;border:none;border-top:2px dashed var(--fl);padding:7px 12px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:var(--fo);cursor:pointer;text-align:center;}
.ev-tog:active{background:var(--fc);}
.ev-det{display:none;padding:10px 12px 12px;border-top:2px dashed var(--fl);}
.ev-det.open{display:block;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.db{background:#fafafa;border:1.5px solid var(--fl);border-radius:10px;padding:7px 9px;}
.db.full{grid-column:span 2;}
.db.stafette{border-color:#4dd0e1;background:#e0f7fa;}
.db-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:3px;}
.db.stafette .db-lbl{color:#00838f;}
.db-val{font-size:12px;font-weight:700;color:var(--ink);line-height:1.35;}
.db-val.empty{color:#ccc;font-size:15px;}
.db-val.tbd{color:var(--mu);font-style:italic;font-size:11px;}
.ev-comment{font-size:11px;color:var(--mu);font-style:italic;margin-top:7px;padding-top:6px;border-top:1px dashed var(--fl);}

.footer{text-align:center;padding:24px 16px 48px;color:var(--mu);font-size:12px;font-weight:700;}
.ft-fox{font-size:36px;animation:wobble 3s ease-in-out infinite;margin-bottom:8px;}
.ft-stars{display:flex;justify-content:center;gap:6px;margin-bottom:8px;font-size:16px;}
.ft-stars span{animation:floatPaw 2s ease-in-out infinite;}
.ft-stars span:nth-child(2){animation-delay:.3s;}
.ft-stars span:nth-child(3){animation-delay:.6s;}
.ft-stars span:nth-child(4){animation-delay:.9s;}
.ft-stars span:nth-child(5){animation-delay:1.2s;}
.fd{position:fixed;pointer-events:none;z-index:0;font-size:28px;animation:floatPaw 5s ease-in-out infinite;}
.fd:nth-child(1){top:18%;right:3%;animation-delay:0s;}
.fd:nth-child(2){top:42%;left:2%;animation-delay:1.2s;}
.fd:nth-child(3){top:68%;right:4%;animation-delay:2.5s;}
.fd:nth-child(4){top:84%;left:3%;animation-delay:.7s;}
.cfp{position:fixed;pointer-events:none;font-size:22px;z-index:999;animation:confettiFall 1.8s ease-in forwards;}
</style>
</head>
<body>

<div class="fd">🐾</div><div class="fd">🦊</div><div class="fd">🐾</div><div class="fd">🦊</div>

<header class="hdr">
  <div class="hdr-bg">
    <span style="top:-10px;left:-15px;animation-delay:0s">🐾</span>
    <span style="top:10px;right:-10px;animation-delay:1s">🦊</span>
    <span style="bottom:-20px;left:35%;animation-delay:2s">🐾</span>
  </div>

  <!-- ═══ LIVING FOX ═══ -->
  <div class="fox-stage" id="foxStage" onclick="foxPoked()">
    <div class="fox-bubble" id="foxBubble">❤️</div>
    <svg id="foxSVG" viewBox="0 0 120 190" xmlns="http://www.w3.org/2000/svg">

      <!-- SHADOW -->
      <ellipse cx="60" cy="182" rx="38" ry="6" fill="#00000018"/>

      <!-- TAIL curls left, fluffy white tip -->
      <g id="foxTail" style="transform-origin:52px 138px; animation:tailIdle 3s ease-in-out infinite;">
        <path d="M52,138 Q14,126 8,104 Q2,84 14,74 Q26,64 38,76 Q48,88 50,112 Q52,126 54,136 Z" fill="#FF6B35"/>
        <path d="M14,74 Q26,64 38,76 Q30,84 22,92 Q10,98 14,74 Z" fill="#FFD4B8"/>
      </g>

      <!-- BODY sitting — breathes -->
      <g id="foxBody" style="transform-origin:60px 130px; animation:breathe 3.5s ease-in-out infinite;">
        <ellipse cx="60" cy="142" rx="32" ry="24" fill="#C94A12"/>
        <ellipse cx="60" cy="118" rx="25" ry="30" fill="#FF6B35"/>
        <!-- Belly cream — matches icon -->
        <ellipse cx="60" cy="130" rx="17" ry="22" fill="#FFD4B8"/>
      </g>

      <!-- PAWS tucked -->
      <g id="foxPaws" style="animation:pawShift 4s ease-in-out infinite;">
        <ellipse cx="46" cy="160" rx="9" ry="6" fill="#C94A12"/>
        <ellipse cx="46" cy="160" rx="6" ry="4" fill="#FF6B35"/>
        <ellipse cx="74" cy="160" rx="9" ry="6" fill="#C94A12"/>
        <ellipse cx="74" cy="160" rx="6" ry="4" fill="#FF6B35"/>
      </g>

      <!-- NECK -->
      <ellipse cx="60" cy="92" rx="17" ry="13" fill="#FF6B35"/>

      <!-- HEAD — exact same cartoon style as small icon fox -->
      <g id="foxHead" style="transform-origin:60px 60px; animation:headSway 5s ease-in-out infinite;">

        <!-- Head round base — same orange #FF6B35 -->
        <ellipse cx="60" cy="58" rx="28" ry="26" fill="#FF6B35"/>

        <!-- LEFT EAR — tall triangle, dark inner, pink fill — matches icon -->
        <g id="earL" style="transform-origin:44px 38px; animation:earIdleL 6s ease-in-out infinite;">
          <polygon points="44,40 30,10 56,34" fill="#FF6B35"/>
          <polygon points="44,40 34,14 53,33" fill="#C94A12"/>
          <polygon points="44,40 37,18 51,33" fill="#FF9A7A" opacity="0.85"/>
        </g>

        <!-- RIGHT EAR -->
        <g id="earR" style="transform-origin:76px 38px; animation:earIdleR 7s ease-in-out infinite;">
          <polygon points="76,40 64,34 90,10" fill="#FF6B35"/>
          <polygon points="76,40 67,33 86,14" fill="#C94A12"/>
          <polygon points="76,40 69,33 83,18" fill="#FF9A7A" opacity="0.85"/>
        </g>

        <!-- White/cream face patch — FFD4B8 exactly like icon -->
        <ellipse cx="60" cy="66" rx="19" ry="17" fill="#FFD4B8"/>

        <!-- EYE LEFT — large round black, one big white shine dot — icon style -->
        <g id="eyeL" style="transform-origin:49px 57px; animation:blinkL 5s ease-in-out infinite;">
          <ellipse cx="49" cy="57" rx="7" ry="7.5" fill="#2D1A0E"/>
          <circle cx="52" cy="54" r="2.8" fill="white"/>
        </g>

        <!-- EYE RIGHT -->
        <g id="eyeR" style="transform-origin:71px 57px; animation:blinkR 4.5s ease-in-out infinite 1.2s;">
          <ellipse cx="71" cy="57" rx="7" ry="7.5" fill="#2D1A0E"/>
          <circle cx="74" cy="54" r="2.8" fill="white"/>
        </g>

        <!-- Cheek blush — like icon -->
        <ellipse cx="37" cy="66" rx="6" ry="4" fill="#FF9A7A" opacity="0.45"/>
        <ellipse cx="83" cy="66" rx="6" ry="4" fill="#FF9A7A" opacity="0.45"/>

        <!-- NOSE — small dark ellipse + shine, like icon -->
        <g id="foxNose" style="transform-origin:60px 70px; animation:noseIdle 4s ease-in-out infinite;">
          <ellipse cx="60" cy="70" rx="4.5" ry="3.2" fill="#2D1A0E"/>
          <ellipse cx="58.5" cy="69" rx="1.4" ry="0.9" fill="#666" opacity="0.5"/>
        </g>

        <!-- MOUTH — simple curved smile like icon -->
        <path id="foxMouth" d="M53,75 Q60,81 67,75" fill="none" stroke="#2D1A0E" stroke-width="2" stroke-linecap="round"/>

      </g>

    </svg>
  </div>
  <!-- ═══ END FOX ═══ -->

  <h1 class="hdr-title">Fuxen Planung<br><em>FS26</em></h1>
  <p class="hdr-sub">Zofingia St. Gallen · Frühjahrssemester 2026</p>
</header>
<div class="jagged jagged-top"></div>

<div class="runner">
  <div class="runner-ground"></div>
  <div class="runner-fox">🦊</div>
</div>

<div class="sel">
  <div class="sel-title"><span class="bounce">🐾</span> Welcher Fux bist du?</div>
  <div class="sel-wrap">
    <select id="fp" onchange="showFux()">
      <option value="">— Fux auswählen —</option>
      <option>InnoZ!ent</option>
      <option>Dies-das-AnanaZ!</option>
      <option>Goschdym</option>
      <option>SheRhe</option>
      <option>Sonny</option>
      <option>LeFleur</option>
      <option>San. Π</option>
      <option>Möses</option>
      <option>Fumbler</option>
      <option>Rigolo</option>
      <option>Mèreci</option>
      <option>NoseDive</option>
      <option>Talleyrand</option>
      <option>Hold-on-Pump-on</option>
      <option>Tschong</option>
      <option>ReActor</option>
      <option>Sihl</option>
    </select>
  </div>
</div>

<div class="fux-panel" id="fuxPanel">
  <div class="ph">
    <div class="pav">🦊</div>
    <div>
      <div class="pn" id="pName">—</div>
      <div class="pc2" id="pCount"></div>

const fox = {
  head: null, tail: null, body: null, mouth: null, bubble: null,
  stage: null, currentMode: 'idle', modeTimer: null,

  init() {
    this.head  = document.getElementById('foxHead');
    this.tail  = document.getElementById('foxTail');
    this.body  = document.getElementById('foxBody');
    this.mouth = document.getElementById('foxMouth');
    this.bubble= document.getElementById('foxBubble');
    this.stage = document.getElementById('foxStage');
    this.idleLoop();
  },

  setMode(mode, durationMs) {
    clearTimeout(this.modeTimer);
    this.currentMode = mode;
    this._applyMode(mode);
    if (durationMs) {
      this.modeTimer = setTimeout(() => this.setMode('idle'), durationMs);
    }
  },

  _applyMode(mode) {
    const h = this.head, t = this.tail, b = this.body;
    // Reset inline animations
    [h, t, b].forEach(el => { if(el) el.style.animation = ''; });

    if (mode === 'idle') {
      h.style.animation = 'headSway 5s ease-in-out infinite';
      t.style.animation = 'tailIdle 3s ease-in-out infinite';
      b.style.animation = 'breathe 3.5s ease-in-out infinite';
      this.setSmile('normal');
    } else if (mode === 'excited') {
      h.style.animation = 'excited 1.4s ease-in-out 2';
      t.style.animation = 'tailWag 0.4s ease-in-out infinite';
      b.style.animation = 'breathe 1.2s ease-in-out infinite';
      this.setSmile('happy');
      this.showBubble('❤️');
    } else if (mode === 'curious') {
      h.style.animation = 'headTilt 1.2s ease-in-out 2';
      t.style.animation = 'tailIdle 2s ease-in-out infinite';
      b.style.animation = 'breathe 2.5s ease-in-out infinite';
      this.setSmile('open');
      this.showBubble('🤔');
    } else if (mode === 'happy') {
      h.style.animation = 'sniffAround 2s ease-in-out 2';
      t.style.animation = 'tailThump 0.6s ease-in-out 4';
      b.style.animation = 'breathe 1.5s ease-in-out infinite';
      this.setSmile('happy');
      this.showBubble('🎉');
    } else if (mode === 'poked') {
      h.style.animation = 'jumpUp 0.7s ease-in-out 1';
      t.style.animation = 'tailThump 0.4s ease-in-out 3';
      b.style.animation = 'jumpUp 0.7s ease-in-out 1';
      this.setSmile('surprised');
      this.showBubble('😮');
    } else if (mode === 'sad') {
      h.style.animation = 'headTilt 3s ease-in-out infinite';
      t.style.animation = 'tailIdle 6s ease-in-out infinite';
      b.style.animation = 'breathe 4s ease-in-out infinite';
      this.setSmile('sad');
      this.showBubble('😕');
    }
  },

  setSmile(type) {
    if (!this.mouth) return;
    const paths = {
      normal:    'M89,83 Q95,87 101,83',
      happy:     'M86,82 Q95,90 104,82',
      open:      'M89,83 Q95,88 101,83',
      surprised: 'M90,82 Q95,88 100,82',
      sad:       'M89,86 Q95,82 101,86',
    };
    this.mouth.setAttribute('d', paths[type] || paths.normal);
  },

  showBubble(emoji) {
    const b = this.bubble;
    b.textContent = emoji;
    b.className = 'fox-bubble';
    void b.offsetWidth;
    b.className = 'fox-bubble pop';
    setTimeout(() => { b.className = 'fox-bubble'; }, 1100);
  },

  idleLoop() {
    // Occasional random idle behaviours
    const rand = () => {
      if (this.currentMode !== 'idle') return;
      const r = Math.random();
      if      (r < 0.3) this.setMode('curious', 3000);
      else if (r < 0.5) { /* just blink — CSS handles it */ }
      // Random next check in 4–10 seconds
      setTimeout(rand, 4000 + Math.random() * 6000);
    };
    setTimeout(rand, 3000);
  }
};

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function isPast(e){return pd(e.d)<new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());}
function isToday(e){const d=pd(e.d);return d.getFullYear()===TODAY.getFullYear()&&d.getMonth()===TODAY.getMonth()&&d.getDate()===TODAY.getDate();}
function mtch(field,fux){if(!field)return false;return field.toLowerCase().includes(fux.toLowerCase());}

function getRoles(e,fux){
  const rs=[];
  if(mtch(e.v,fux)) rs.push({l:'Vorbereitung',p:'pv2'});
  if(mtch(e.s,fux)) rs.push({l:'Stoffuxen',p:'ps2'});
  if(mtch(e.a,fux)) rs.push({l:'Aufräumen',p:'pa2'});
  if(mtch(e.p,fux)) rs.push({l:'Produktion',p:'pp2'});
  if(mtch(e.st,fux)) rs.push({l:'Stafette',p:'pst2'});
  if(mtch(e.c,fux)) rs.push({l:'Chargieren',p:'pc3'});
  if(mtch(e.wb,fux)) rs.push({l:'Wegbier',p:'pwb'});
  if(mtch(e.ru,fux)) rs.push({l:'Rüümli 18:00',p:'pru'});
  return rs;
}

function fmtShort(e){const d=pd(e.d);if(e.d2){const e2=pd(e.d2);return d.getDate()+'–'+e2.getDate()+'. '+MOS[d.getMonth()];}return d.getDate()+'. '+MOS[d.getMonth()];}
function fmtDay(e){const d=pd(e.d);if(e.d2){const e2=pd(e.d2);return d.getDate()+'–'+e2.getDate();}return d.getDate();}
function dv(v){if(!v)return '<span class="db-val empty">❌</span>';if(v==='(tbd.)')return '<span class="db-val tbd">tbd.</span>';return '<span class="db-val">'+v+'</span>';}

function showFux(){
  const fux=document.getElementById('fp').value;
  const panel=document.getElementById('fuxPanel');
  if(!fux){panel.classList.remove('show'); fox.setMode('curious', 2500); return;}
  const mine=DATA.filter(e=>getRoles(e,fux).length>0);
  document.getElementById('pName').textContent=fux;
  document.getElementById('pCount').textContent=mine.length+' Anlässe mit Aufgaben 🦊';
  if(mine.length===0){
    document.getElementById('pList').innerHTML='<div class="no-tasks">🦊 Noch keine Aufgaben eingetragen!</div>';
    fox.setMode('sad', 3000);
  } else {
    document.getElementById('pList').innerHTML=mine.map((e,i)=>{
      const roles=getRoles(e,fux);
      const past=isPast(e);
      return `<div class="pev" style="animation-delay:${i*.07}s;opacity:${past?.55:1}">
        <div class="pev-top"><div class="pev-name">${e.t}</div><div class="pev-date">${fmtShort(e)}</div></div>
        <div class="pev-meta">📍 ${e.ort} · ${e.time}</div>
        <div class="pills">${roles.map(r=>`<span class="pill ${r.p}">${r.l}</span>`).join('')}</div>
        ${e.k?`<div class="pev-comment">💬 ${e.k}</div>`:''}
      </div>`;
    }).join('');
    fox.setMode('excited', 3500);
  }
  panel.classList.remove('show');
  void panel.offsetWidth;
  panel.classList.add('show');
  if(mine.length>0) boom();
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),200);
}

function boom(){
  const emojis=['🦊','🐾','⭐','🧡','✨','🎉','🏅'];
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cfp';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*100+'vw';el.style.top='-40px';
      el.style.animationDuration=(1.2+Math.random()*.8)+'s';
      document.body.appendChild(el);setTimeout(()=>el.remove(),2600);
    },i*70);
  }
}

function toggleDetail(btn){
  const d=btn.nextElementSibling;const open=d.classList.contains('open');
  d.classList.toggle('open',!open);
  btn.textContent=open?'Details ansehen 🦊 ▾':'Zuklappen 🦊 ▴';
}

(function build(){
  const cont=document.getElementById('evlist');let curMo=-1,html='';

    const d=pd(e.d),mo=d.getMonth();
    if(mo!==curMo){curMo=mo;html+=`<div class="mol">🦊 ${MOS_F[mo]} ${d.getFullYear()}</div>`;}
    const past=isPast(e),today=isToday(e),multi=!!e.d2;
    const cc=['ev',past?'past':'',today?'today':'',multi?'multi':''].filter(Boolean).join(' ');
    const chips=[
      e.v&&e.v!=='(tbd.)'?`<span class="chip ch-v">Vorb.</span>`:'',
      e.s&&e.s!=='(tbd.)'?`<span class="chip ch-s">Stoff</span>`:'',
      e.a&&e.a!=='(tbd.)'?`<span class="chip ch-a">Aufr.</span>`:'',
      e.p&&e.p!=='(tbd.)'?`<span class="chip ch-p">Produ</span>`:'',
      e.st?`<span class="chip ch-st">Stafette</span>`:'',
      e.c&&e.c!=='(tbd.)'?`<span class="chip ch-c">Charg.</span>`:'',
      e.wb?`<span class="chip ch-wb">Wegbier</span>`:'',
      e.ru?`<span class="chip ch-ru">Rüümli 18:00</span>`:'',
    ].filter(Boolean).join('');
    html+=`<div class="${cc}" style="animation-delay:${(i%8)*.05}s">
      <div class="ev-top">
        <div class="ev-dt"><div class="ev-day">${fmtDay(e)}</div><div class="ev-mo">${MOS[d.getMonth()]}</div><div class="ev-time">${e.time}</div>${today?'<div class="today-chip">HEUTE</div>':''}</div>
        <div class="ev-body"><div class="ev-title">${e.t}</div><div class="ev-loc">📍 ${e.ort}</div><div class="ev-chips">${chips}</div></div>
      </div>
      <button class="ev-tog" onclick="toggleDetail(this)">Details ansehen 🦊 ▾</button>
      <div class="ev-det">
        <div class="dgrid">
          <div class="db"><div class="db-lbl">Vorbereitung</div>${dv(e.v)}</div>
          <div class="db"><div class="db-lbl">Stoffuxen</div>${dv(e.s)}</div>
          <div class="db"><div class="db-lbl">Aufräumen</div>${dv(e.a)}</div>
          <div class="db"><div class="db-lbl">Produktion</div>${dv(e.p)}</div>
          ${e.st?`<div class="db full stafette"><div class="db-lbl">Stafette</div><span class="db-val">${e.st}</span></div>`:''}
          <div class="db full"><div class="db-lbl">Chargieren</div>${dv(e.c)}</div>
          ${e.wb?`<div class="db full" style="border-color:#ffd54f;background:#fff9c4"><div class="db-lbl" style="color:#f57f17">Wegbier</div><span class="db-val">${e.wb}</span></div>`:''}
          ${e.ru?`<div class="db full" style="border-color:#9fa8da;background:#e8eaf6"><div class="db-lbl" style="color:#283593">Rüümli 18:00</div><span class="db-val">${e.ru}</span></div>`:''}
        </div>
        ${e.k?`<div class="ev-comment">💬 ${e.k}</div>`:''}
      </div>
    </div>`;
  });
  cont.innerHTML=html;
})();
